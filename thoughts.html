<!DOCTYPE html>
<head>
    <title style="color: blue;">thoughts</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="/icons/thoughts.png">
    <script src="/script.js"></script>
</head>
<script>
    function replace(toggle = true) {
        let thoughts = getCookie('thoughts')
        if (toggle === true) {
            if (thoughts === 'false') {
                setCookie('thoughts', 'true')
                document.getElementById('stories').innerHTML = '<span style="color: #0099ff;">Stories</span>'
                document.getElementById('universes').innerHTML = '<span style="color: skyblue;">Universes</span>'
                document.getElementById('passUser').innerHTML = '<span style="color: white;">character sheets</span>'
                document.getElementById('doc').innerHTML = 'character sheets google doc (deprecated)'
                document.getElementById('3ds').innerHTML = '3ds stuff';
                document.getElementById('writing').innerHTML = '<span style="color: white;">writing stuff</span>'
                document.getElementById('lore').innerHTML = '<span style="color: white;">lore</span>'
                gewi('vocaloid').innerHTML = '<span style="color: #0ff;">Vocaloid Idle</span>'
                gewi('writers').innerHTML = '<span style="color: white">writers</span>'
            }
            else if (thoughts === 'true') {
                setCookie('thoughts', 'false')
                document.getElementById('stories').innerHTML = ''
                document.getElementById('universes').innerHTML = ''
                document.getElementById('passUser').innerHTML = ''
                document.getElementById('doc').innerHTML = ''
                document.getElementById('3ds').innerHTML = ''
                document.getElementById('writing').innerHTML = ''
                document.getElementById('lore').innerHTML = ''
                gewi('vocaloid').innerHTML = ''
                gewi('writers').innerHTML = ''
            }
        }
        else if (thoughts === 'true' && toggle === false) {
            document.getElementById('stories').innerHTML = '<span style="color: #0099ff;">Stories</span>'
            document.getElementById('universes').innerHTML = '<span style="color: skyblue;">Universes</span>'
            document.getElementById('passUser').innerHTML = '<span style="color: white;">character sheets</span>'
            document.getElementById('doc').innerHTML = 'character sheets google doc &lpar;deprecated&rpar;'
            document.getElementById('3ds').innerHTML = '3ds stuff'
            document.getElementById('writing').innerHTML = '<span style="color: white;">writing stuff</span>'
            document.getElementById('lore').innerHTML = '<span style="color: white;">lore</span>'
            gewi('vocaloid').innerHTML = '<span style="color: #0ff;">Vocaloid Idle</span>'
                gewi('writers').innerHTML = '<span style="color: white">writers</span>'
            }
    }
    window.onload = () => {
        replace(false)
        if (checkCookie('thoughts') === 'error') {
            setCookie('thoughts', 'false')
        }
        document.getElementById('tip').innerHTML += random(tips)
    }
    const tips = [
        '<span oncontextmenu="this.textContent = \'Not here!\'; hideContextmenu">Try right-clicking text for secrets!</span>',
        'See if you can reveal hidden text by highlighting a page!',
        'Recommended by 1e+1 out of 10 doctors!',
        'Recommended by 4x10^2 / 2x10^1 out of 10 optometrists!'
        ]
</script>
<body>
    <h1>thoughts</h1>
    <p>
        <i id='tip' style="color: yellow;"></i><br><br>
        Maybe the reason this website is just black, white, red and blue is part of my design philosophy: basic design that lets the character's personality shine<br>
        Well <span ondblclick="replace()">shit</span>, that rhymes.<br>
        Either that or I'm inexperienced.<br><br>
        It's not just <span ondblclick="window.open('/traumadump.html')">inexperience</span>, though. I really like how this page looks.<br><br>


        <a id='stories' href="stories"></a><br>
        <a id="universes" href="/universes"></a><br>
        <a id="lore" href="/stories/lore"></a><br>
        <a id="writers" href="writers.html"></a><br><br>

        <a href="character-sheets" id="passUser"></a><br>
        <a id="doc" href="https://docs.google.com/document/d/1_JaB4aHlvy7FF0Ulwl8IwmxrR_lsryKxB0W3VUVrp4M/edit?tab=t.b9yrb23q1nt1#heading=h.mjc46dwdun9z" target="_blank" rel="noopener noreferrer"></a><br><br>

        <a id="writing" href="writing-stuff"></a><br>
        <a id="3ds" href="3ds"></a><br><br>
        <a id="vocaloid" href="/vocaloid/clicker.html"></a>
    </p>
</body>
