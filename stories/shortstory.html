<h1 style="text-align: center">Content Warning</h1>
<div class='background' style="text-align: center">\
    Content in this story contains but is not limited to:<br><br>
    <strong>SWEARING, LESBIANS, TRANS WOMEN, CONTEMPT OF AUTHORITY, CRITICISM OF RELIGION</strong> and <strong>MENTIONS OF SUICIDE.</strong>

<h1 id='char' class=\"Character\">Lillian</h1>\
<div class='background'>\
    <p>Welp, time for another day of purgatory. I have to walk to a prison building and spend the equivalent of a 9-5 work shift doing exactly what other people tell me I have to do, because when I'm an adult I'm going to have to get a job and pay rent, so they're going to spend fourteen years of my life not teaching me anything about how the world works, or how to get a job, or how to pay my taxes, or any shit like that. Instead, they're going to teach me about a ton of math I'm never going to use, a bunch of racist and sexist bastards that died trying to keep women and really anyone they didn't like under them, and how to write essays that cater to whatever bullshit they believe.</p><br>
    <p>Sounds fun, right?</p><br>
    <p>I slink through the doors, following a herd of people who look like they feel vaguely the same way I do about this hell. A few people look at my jacket, black and covered in patches and embroidery of many things that are not at all school-appropriate. I got an audience with the principal back when I first wore it here, he told me it went against the dress code, I told him to go fuck himself. Then, for some reason, he thought it was okay to try and pull my jacket off my back, so now he has a bad shoulder and one of his wrists doesn't work quite right.</p><br>
    <p>Good memories.</p><br>
    <p>Anyway, who in their clearly dysfunctional mind thought trying to teach American history to a room of teenagers at seven in the goddamn morning was even a passable idea? Everything I hear for the first half of the day is going to drip out of my ears by lunchtime. They should serve coffee in the cafeteria, that would really wake us up.</p>
    <p>The teacher whose name I haven't been able to remember through the amount of homework he assigns drones on about the Founding Fathers and why they were <i>not</i> super bad people, actually. I can only remember, like, Hamilton and Burr and maybe Jefferson. That musical was awesome. Hell of a lot better than Mr. What's-his-face.</p><br>
    <p>History passes me by half-conscious. I'm about two-thirds awake for my next class... Math, right? Math fucking sucks. I don't give a shit about these numbers. Why do I need to know equations for gravity? I'm not an engineer. I'm never gonna to use them. What are they gonna do, cook me dinner?</p><br>
    <p>Finally, I'm wide awake for my third class with Des. The only person I care about in this hellhole. She walks over to my locker as I'm shoving books into it and pulling different ones out.</p>
    <p>"Hey, girl!" Cool black of the void, hovering next to me closer than anyone else gets to. She wraps her arms around me from behind, almost using my body to hold herself up. "God, this place is horrible. Can't wait to write nothing of fucking value today, just like every other writing class!"</p>
    <p>"You should roast Mr. Klein! The look on his face would be priceless." Mr. Klein is the most boring man in this school. Honestly, with the amount of them it feels like there's a competition.</p>
    <p>"Hmm... That's not a bad idea." She cracks a smile as the cogs in her head turn. "Maybe I should print it and put it on the bulletin board."</p>
    <p>"Then people would have a reason to read it."</p><br>
    <p>We walk down to our next class, across the whole building, lugging computers that barely work. They're not broken or anything; that's just how much the school cares. They can run Google Chrome like a computer fresh off the 70's shelves and nothing else. We can't even really use Chrome, 'cause half the Internet is blocked "because the school has to keep us safe" like I haven't done things with Des that would make the IT department close their eyes, clasp their hands and pray I'm forgiven for my sins.</p><br>
    <p>Like they don't call my existence one.</p><br>
    <p>That's something I never got. Why am I "unnatural"? What makes me different from "normal" people? Is it my functioning brain?</p>
    <p>I can't understand the people who tell me to respect the body God gave me. If God really loved us, would I have been born differently? Would we suffer? If I "respected the body He gave me", would I have stopped thinking that nobody would care if I disappeared? Would I have stopped wanting to?</p>` +
    // been magically cured of my dysphoria and suicidal ideology? Would I have
    // <p>The old man in the sky has either left us, never existed in the first place, or is a sadistic and hateful piece of shit.</p>
    // left off here last time I read it \/
    `<br><p>Or did God ever really love us in the first place?</p><br>
    <p>"You good?" Des looks at me with that horrible mix of care and careful that makes me want to punch something. I would rather hang myself than have <i>her,</i> of all people, be <i>careful</i> with me.</p>
    <p>She knows too. I love the simple comfort that she doesn't pry when I tell her I'm fine; anybody else would have tried to make sure I'm <i>really</i> okay, that I don't need anything, and that I have to yell in their face to get them to mind their own goddamn business.</p>
    <p>She knows I'm lying, and she lets it go because we both know I'll spill later.</p><br>` +
    // its 11:00 am
    `<p>Next up is Science, where me and Des get to fuck around for a whole hour. The teacher tries to ignore us, where I'd say they did about 7.5/10. They've had a lot of practice.</p><br>
    <p>Then... lunch. My favorite class.</p><br>
    <p>Why the fuck do we have assigned seats for lunch? To make new friends? By putting the trans kid at the conservative Christ-kissing asshole table? Are they trying to tell me something? Do they <i>want</i> me to get assaulted? 'Cause that's what happens. I'm not allowed to leave the cafeteria with my lunchbox, and they stand in the hall and stare me down until I grab it and haul my ass over. I've gotten more than one detention for not eating at school, which shouldn't even be a thing.</p>
    <p>I'm not even allowed to <i>stand</i> and eat. And if I so much as sneak a longing glance at Des, I get a free pass on whatever I was doing that afternoon.</p>
    <p>So, the teachers acknowledge me as one of the girls when I'm gay with Des, but otherwise I'm a guy. That makes no fucking sense. They routinely make pointy comments about the fact that I have long hair and that it's somehow "too girly" when my hair is exactly the same as half of the assholes here. Jesus always has hip-length hair, so you'd think that would make it okay.</p>
    <p>The Bitch makes plenty of jeers, too. Called me a faggot (not even close to a record-breaking number for one day), an ugly whore (she looks like a failed carving of a troll and has slept with half the boys while cheating on the other half), a perverted freak (I can show her some real kinky stuff), and a fetishistic abomination, which is new. Asked what trendy department store she got it from, and the look on her face said she wanted to hit me.</p><br>
    <p>"Go ahead. I would <i>love</i> it if you hit me. <i>Please</i> try. Give me everything you have, unless you're scared you can't impress me!"</p><br>
    <p>She called me a masochist and fucked right off. Can't be even a little gay, or she starts melting like a witch.</p><br>
    <p>I should shove my tongue in her mouth.</p><br>
    <p>Now, who's ready for <i>two goddamn hours of SPORTS?!</i> Catastrophically, damn it all, I forgot my doctor's note that says I have to spend PE in the girl's bathroom with my girlfriend. I've got a chronic case of "Slayyy, queen!" than can only be remedied by a true love's kiss.</p>
    <p>I was only able to escape one total hour of physical torture by sneaking under the bleachers while the teacher wasn't looking and receiving generational head. It's a fun little game, </p>
